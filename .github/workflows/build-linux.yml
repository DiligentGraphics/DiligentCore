name: Linux ASan Lavapipe preload

on: [push, pull_request]

jobs:
  asan-vulkan:
    name: Linux -> Clang-ASAN-x64, RelWithDebInfo, Vulkan-SW
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up build environment
        uses: DiligentGraphics/github-action/setup-build-env@v22
        with:
          platform: Linux
          cmake-generator: Ninja

      - name: Configure CMake
        uses: DiligentGraphics/github-action/configure-cmake@v22
        with:
          cc: clang-18
          cxx: clang++-18
          generator: Ninja
          build-type: RelWithDebInfo
          cmake-args: -DDILIGENT_BUILD_CORE_TESTS=ON
          sanitizer: address

      - name: Build DiligentCoreAPITest
        uses: DiligentGraphics/github-action/build@v22
        with:
          target: DiligentCoreAPITest

      - name: DiligentCoreAPITest VK
        env:
          ASAN_OPTIONS: detect_leaks=1
          LD_PRELOAD: /lib/x86_64-linux-gnu/libvulkan_lvp.so
          VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.json
        uses: DiligentGraphics/github-action/run-core-gpu-tests@v22
        with:
          mode: vk_sw
